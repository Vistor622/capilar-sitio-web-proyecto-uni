    <div class="page-hero">

            <h3>Completa el siguiente formulario y nos pondremos en contacto contigo</h3>

    <div class="container">
        <form class="capi-form" action="">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="871 000 0000" required>

            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="name@email.com" required>

            <label for="motivo">¿Qué te gustaría agendar?</label>
            <select id="motivo" name="motivo">
                <option value="videollamada">Videollamada con la especialista ($500)</option>
                <option value="test">Test capilar gratuito</option>
                <option value="cita">Cita presencial</option>
            </select>

            <div class="check-row">
                <input type="checkbox" id="terminos" name="terminos" required>
                <label for="terminos">Acepto los <a href="terminos.html">Términos y Condiciones</a> y la <a href="politica.html">Política de Privacidad</a></label>
            </div>

            <button class="epic" type="submit">ENVIAR SOLICITUD</button>
        </form>
    </div>
